<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'"
  />
  <title>Mind Ball</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      position: relative;
      width: 360px;
      height: 220px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
    }

    .ball {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #7dd3fc, #2563eb);
      box-shadow: 0 0 25px rgba(37, 99, 235, 0.45);

      display: flex;
      justify-content: center;
      align-items: center;

      color: white;
      font-size: 20px;
      font-weight: bold;

      user-select: none;
      cursor: pointer;

      -webkit-app-region: no-drag;
      app-region: no-drag;
    }

    .panel {
      position: absolute;
      left: 180px;
      top: 20px;

      width: 160px;
      min-height: 140px;
      padding: 12px;
      border-radius: 16px;

      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);

      display: none;
      flex-direction: column;
      gap: 10px;

      -webkit-app-region: no-drag;
      app-region: no-drag;
    }

    .panel.show {
      display: flex;
    }

    .panel textarea {
      width: 100%;
      height: 80px;
      resize: none;
      border: 1px solid #ccc;
      border-radius: 10px;
      padding: 8px;
      box-sizing: border-box;
      font-size: 14px;
      outline: none;
    }

    .panel button {
      height: 36px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-size: 14px;
      cursor: pointer;
    }

    .panel button:hover {
      opacity: 0.92;
    }

    .hint {
      font-size: 12px;
      color: #666;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="ball" id="ball">Mind</div>

    <div class="panel" id="panel">
      <textarea id="noteInput" placeholder="写下此刻的想法..."></textarea>
      <button id="saveBtn">保存</button>
      <div class="hint" id="hintText">还没有保存内容</div>
    </div>
  </div>

  <script>
    const ball = document.getElementById('ball');
    const panel = document.getElementById('panel');
    const saveBtn = document.getElementById('saveBtn');
    const noteInput = document.getElementById('noteInput');
    const hintText = document.getElementById('hintText');

    ball.addEventListener('click', () => {
      panel.classList.toggle('show');
    });

    saveBtn.addEventListener('click', () => {
      const text = noteInput.value.trim();

      if (text === '') {
        hintText.textContent = '你还没有输入内容';
        return;
      }

      hintText.textContent = '已保存：' + text;
      noteInput.value = '';
    });
  </script>
</body>
</html>
