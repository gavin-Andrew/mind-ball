<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'"
  />
  <title>Mind Ball</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .ball {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #7dd3fc, #2563eb);
      box-shadow: 0 0 25px rgba(37, 99, 235, 0.45);
      
      display: flex;
      justify-content: center;
      align-items: center;

      color: white;
      font-size: 20px;
      font-weight: bold;

      user-select: none;
      -webkit-app-region: drag;
      app-region: drag;
    }
  </style>
</head>
<body>
  <div class="ball">Mind</div>
</body>
</html>
