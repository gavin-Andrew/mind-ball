<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'"
  />
  <title>Mind Ball</title>

  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      position: relative;
      width: 470px;
      height: 350px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
    }

    .ball-area {
      width: 160px;
      height: 240px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }

    .drag-handle {
      width: 90px;
      height: 18px;
      margin-bottom: 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.28);
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.12);
      cursor: move;
      user-select: none;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .drag-handle:hover {
      transform: scale(1.04);
      opacity: 0.95;
    }

    .ball {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #7dd3fc, #2563eb);
      box-shadow: 0 0 25px rgba(37, 99, 235, 0.45);
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 20px;
      font-weight: bold;
      user-select: none;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .ball:hover {
      transform: scale(1.03);
      box-shadow: 0 0 30px rgba(37, 99, 235, 0.55);
    }

    .panel {
      position: absolute;
      left: 180px;
      top: 8px;
      width: 260px;
      min-height: 300px;
      max-height: 330px;
      padding: 12px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.18);
      display: flex;
      flex-direction: column;
      gap: 10px;
      opacity: 0;
      transform: translateY(10px) scale(0.98);
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .panel.show {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    .panel textarea {
      width: 100%;
      height: 78px;
      resize: none;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 8px;
      box-sizing: border-box;
      font-size: 14px;
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .panel textarea:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.12);
    }

    .action-row {
      display: flex;
      gap: 8px;
    }

    .panel button {
      height: 36px;
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 14px;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease, background 0.15s ease;
    }

    .panel button:hover {
      opacity: 0.93;
      transform: translateY(-1px);
    }

    .primary-btn {
      flex: 1;
      background: #2563eb;
    }

    .secondary-btn {
      width: 88px;
      background: #6b7280;
    }

    .secondary-btn.hidden {
      display: none;
    }

    .hint {
      min-height: 18px;
      font-size: 12px;
      color: #666;
      text-align: center;
    }

    .notes-title {
      font-size: 13px;
      font-weight: bold;
      color: #2563eb;
      margin-top: 2px;
    }

    .notes-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow-y: auto;
      max-height: 152px;
      padding-right: 2px;
    }

    .empty-text {
      font-size: 12px;
      color: #777;
      text-align: center;
      padding: 10px 0;
    }

    .note-item {
      background: #f3f4f6;
      border-radius: 12px;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      animation: fadeInUp 0.2s ease;
    }

    .note-content {
      font-size: 12px;
      color: #333;
      line-height: 1.55;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .note-content.collapsed {
      display: -webkit-box;
      -webkit-line-clamp: 3;
      line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .text-action-row {
      display: flex;
      justify-content: flex-end;
      margin-top: -2px;
    }

    .text-toggle-btn {
      border: none;
      background: transparent;
      color: #111111 !important;
      font-size: 11px;
      cursor: pointer;
      padding: 0;
      height: auto;
    }

    .note-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .note-time {
      font-size: 11px;
      color: #777;
      flex: 1;
      min-width: 120px;
    }

    .note-actions {
      display: flex;
      gap: 6px;
    }

    .small-btn {
      border: none;
      color: white;
      border-radius: 8px;
      padding: 4px 8px;
      font-size: 11px;
      cursor: pointer;
      min-width: 54px;
    }

    .edit-btn {
      background: #f59e0b;
    }

    .delete-btn {
      background: #ef4444;
    }

    .delete-btn.confirming {
      background: #b91c1c;
    }

    .draft-badge {
      font-size: 11px;
      color: #2563eb;
      text-align: center;
      min-height: 16px;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .notes-list::-webkit-scrollbar {
      width: 6px;
    }

    .notes-list::-webkit-scrollbar-thumb {
      background: rgba(148, 163, 184, 0.7);
      border-radius: 999px;
    }

    .notes-list::-webkit-scrollbar-track {
      background: transparent;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="ball-area">
      <div class="drag-handle" id="dragHandle" title="按住这里拖动"></div>
      <div class="ball" id="ball">Mind</div>
    </div>

    <div class="panel" id="panel">
      <textarea id="noteInput" placeholder="写下此刻的想法..."></textarea>

      <div class="action-row">
        <button id="saveBtn" class="primary-btn">保存</button>
        <button id="cancelEditBtn" class="secondary-btn hidden">取消编辑</button>
      </div>

      <div class="hint" id="hintText">还没有保存内容</div>
      <div class="draft-badge" id="draftBadge"></div>

      <div class="notes-title">历史记录</div>
      <div class="notes-list" id="notesList"></div>
    </div>
  </div>

  <script>
    const fs = require('fs');
    const path = require('path');
    const { ipcRenderer } = require('electron');

    const dragHandle = document.getElementById('dragHandle');
    const ball = document.getElementById('ball');
    const panel = document.getElementById('panel');
    const saveBtn = document.getElementById('saveBtn');
    const cancelEditBtn = document.getElementById('cancelEditBtn');
    const noteInput = document.getElementById('noteInput');
    const hintText = document.getElementById('hintText');
    const draftBadge = document.getElementById('draftBadge');
    const notesList = document.getElementById('notesList');

    const notesFilePath = path.join(__dirname, 'notes.json');
    const draftFilePath = path.join(__dirname, 'draft.json');

    const defaultHintText = '还没有保存内容';
    const expandThreshold = 90;

    let isDragging = false;
    let pendingDeleteId = null;
    let pendingDeleteTimer = null;
    let hintTimer = null;
    let draftTimer = null;
    let editingNoteId = null;
    let expandedNoteIds = new Set();

    function showHint(message, duration = 2000) {
      hintText.textContent = message;

      if (hintTimer) {
        clearTimeout(hintTimer);
        hintTimer = null;
      }

      hintTimer = setTimeout(() => {
        hintText.textContent = defaultHintText;
        hintTimer = null;
      }, duration);
    }

    function resetHint() {
      if (hintTimer) {
        clearTimeout(hintTimer);
        hintTimer = null;
      }

      hintText.textContent = defaultHintText;
    }

    function normalizeNotes(notes) {
      let hasLegacyNote = false;

      const normalizedNotes = notes.map((note, index) => {
        if (note.id && note.createdAt && note.updatedAt) {
          return note;
        }

        hasLegacyNote = true;

        let oldTime = new Date().toISOString();

        if (note.time) {
          const parsedTime = new Date(note.time);
          if (!Number.isNaN(parsedTime.getTime())) {
            oldTime = parsedTime.toISOString();
          }
        }

        return {
          id: `old_note_${index}_${Date.now()}`,
          content: note.content || '',
          createdAt: oldTime,
          updatedAt: oldTime
        };
      });

      return {
        normalizedNotes,
        hasLegacyNote
      };
    }

    function writeJsonFile(filePath, data) {
      try {
        fs.writeFileSync(filePath, JSON.stringify(data, null, 2), 'utf-8');
        return true;
      } catch (error) {
        console.error(`写入文件失败：${filePath}`, error);
        return false;
      }
    }

    function readJsonFile(filePath, fallbackValue) {
      if (!fs.existsSync(filePath)) {
        return fallbackValue;
      }

      try {
        const fileContent = fs.readFileSync(filePath, 'utf-8');
        return JSON.parse(fileContent);
      } catch (error) {
        console.error(`读取文件失败：${filePath}`, error);
        return fallbackValue;
      }
    }

    function writeNotes(notes) {
      return writeJsonFile(notesFilePath, notes);
    }

    function readNotes() {
      const notes = readJsonFile(notesFilePath, []);

      if (!Array.isArray(notes)) {
        return [];
      }

      const result = normalizeNotes(notes);

      if (result.hasLegacyNote) {
        writeNotes(result.normalizedNotes);
      }

      return result.normalizedNotes;
    }

    function readDraft() {
      const draft = readJsonFile(draftFilePath, null);

      if (!draft || typeof draft !== 'object') {
        return null;
      }

      if (typeof draft.content !== 'string') {
        return null;
      }

      return draft;
    }

    function saveDraft(content) {
      const draftData = {
        content,
        updatedAt: new Date().toISOString()
      };

      const success = writeJsonFile(draftFilePath, draftData);

      if (success) {
        updateDraftBadge('草稿已自动保存');
      }
    }

    function clearDraft() {
      try {
        if (fs.existsSync(draftFilePath)) {
          fs.unlinkSync(draftFilePath);
        }
      } catch (error) {
        console.error('删除 draft.json 失败：', error);
      }

      updateDraftBadge('');
    }

    function updateDraftBadge(text) {
      draftBadge.textContent = text || '';
    }

    function formatTime(isoString) {
      const date = new Date(isoString);

      if (Number.isNaN(date.getTime())) {
        return '时间未知';
      }

      return date.toLocaleString();
    }

    function formatNoteTime(note) {
      const createdText = formatTime(note.createdAt);
      const updatedText = formatTime(note.updatedAt);

      if (note.createdAt !== note.updatedAt) {
        return `创建：${createdText} ｜ 更新：${updatedText}`;
      }

      return `创建：${createdText}`;
    }

    function clearPendingDelete() {
      pendingDeleteId = null;

      if (pendingDeleteTimer) {
        clearTimeout(pendingDeleteTimer);
        pendingDeleteTimer = null;
      }
    }

    function startDeleteConfirm(noteId) {
      clearPendingDelete();
      pendingDeleteId = noteId;

      pendingDeleteTimer = setTimeout(() => {
        pendingDeleteId = null;
        pendingDeleteTimer = null;
        renderNotes();
        resetHint();
      }, 3000);

      renderNotes();
    }

    function setEditingMode(note) {
      editingNoteId = note.id;
      noteInput.value = note.content || '';
      saveBtn.textContent = '更新记录';
      cancelEditBtn.classList.remove('hidden');
      noteInput.focus();
      noteInput.setSelectionRange(noteInput.value.length, noteInput.value.length);
      showHint('正在编辑这条记录', 2000);
      scheduleDraftSave();
    }

    function exitEditingMode(clearInput = false) {
      editingNoteId = null;
      saveBtn.textContent = '保存';
      cancelEditBtn.classList.add('hidden');

      if (clearInput) {
        noteInput.value = '';
      }
    }

    function shouldCollapse(content) {
      return (content || '').length > expandThreshold;
    }

    function toggleExpand(noteId) {
      if (expandedNoteIds.has(noteId)) {
        expandedNoteIds.delete(noteId);
      } else {
        expandedNoteIds.add(noteId);
      }

      renderNotes();
    }

    function renderNotes() {
      const notes = readNotes();
      notesList.innerHTML = '';

      if (notes.length === 0) {
        notesList.innerHTML = '<div class="empty-text">暂无记录</div>';
        return;
      }

      const reversedNotes = [...notes].reverse();

      reversedNotes.forEach((note) => {
        const item = document.createElement('div');
        item.className = 'note-item';

        const content = document.createElement('div');
        content.className = 'note-content';

        const isExpanded = expandedNoteIds.has(note.id);
        const needCollapse = shouldCollapse(note.content || '');

        if (needCollapse && !isExpanded) {
          content.classList.add('collapsed');
        }

        content.textContent = note.content || '暂无内容';
        item.appendChild(content);

        if (needCollapse) {
          const textActionRow = document.createElement('div');
          textActionRow.className = 'text-action-row';

          const toggleBtn = document.createElement('button');
          toggleBtn.className = 'text-toggle-btn';
          toggleBtn.textContent = isExpanded ? '收起' : '展开';
          toggleBtn.addEventListener('click', () => {
            toggleExpand(note.id);
          });

          textActionRow.appendChild(toggleBtn);
          item.appendChild(textActionRow);
        }

        const footer = document.createElement('div');
        footer.className = 'note-footer';

        const time = document.createElement('span');
        time.className = 'note-time';
        time.textContent = formatNoteTime(note);

        const actions = document.createElement('div');
        actions.className = 'note-actions';

        const editBtn = document.createElement('button');
        editBtn.className = 'small-btn edit-btn';
        editBtn.textContent = '编辑';
        editBtn.addEventListener('click', () => {
          clearPendingDelete();
          setEditingMode(note);
          renderNotes();
        });

        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'small-btn delete-btn';

        const isConfirming = pendingDeleteId === note.id;

        if (isConfirming) {
          deleteBtn.textContent = '确认删除';
          deleteBtn.classList.add('confirming');
        } else {
          deleteBtn.textContent = '删除';
        }

        deleteBtn.addEventListener('click', () => {
          if (pendingDeleteId === note.id) {
            deleteNote(note.id);
          } else {
            startDeleteConfirm(note.id);
            showHint('请再次点击以确认删除', 2000);
          }
        });

        actions.appendChild(editBtn);
        actions.appendChild(deleteBtn);

        footer.appendChild(time);
        footer.appendChild(actions);

        item.appendChild(footer);
        notesList.appendChild(item);
      });
    }

    function saveNote() {
      const text = noteInput.value.trim();

      if (text === '') {
        showHint('你还没有输入内容', 2000);
        return;
      }

      const notes = readNotes();
      const now = new Date().toISOString();

      if (editingNoteId) {
        const targetIndex = notes.findIndex((note) => note.id === editingNoteId);

        if (targetIndex === -1) {
          showHint('未找到要编辑的记录', 2000);
          exitEditingMode(false);
          return;
        }

        notes[targetIndex] = {
          ...notes[targetIndex],
          content: text,
          updatedAt: now
        };

        const success = writeNotes(notes);

        if (success) {
          clearPendingDelete();
          clearDraft();
          exitEditingMode(true);
          showHint('记录已更新', 2000);
          renderNotes();
          noteInput.focus();
        } else {
          showHint('更新失败', 2000);
        }

        return;
      }

      const newNote = {
        id: `note_${Date.now()}`,
        content: text,
        createdAt: now,
        updatedAt: now
      };

      notes.push(newNote);

      const success = writeNotes(notes);

      if (success) {
        clearPendingDelete();
        clearDraft();
        showHint('已保存到本地', 2000);
        noteInput.value = '';
        renderNotes();
        noteInput.focus();
      } else {
        showHint('保存失败', 2000);
      }
    }

    function deleteNote(noteId) {
      const notes = readNotes();
      const filteredNotes = notes.filter((note) => note.id !== noteId);
      const success = writeNotes(filteredNotes);

      if (success) {
        if (editingNoteId === noteId) {
          exitEditingMode(true);
          clearDraft();
        }

        clearPendingDelete();
        expandedNoteIds.delete(noteId);
        showHint('已删除一条记录', 2000);
        renderNotes();
      } else {
        showHint('删除失败', 2000);
      }
    }

    function restoreDraftIfNeeded() {
      const draft = readDraft();

      if (!draft) {
        updateDraftBadge('');
        return;
      }

      if (typeof draft.content === 'string' && draft.content.trim() !== '') {
        if (noteInput.value.trim() === '') {
          noteInput.value = draft.content;
        }

        updateDraftBadge(`已恢复草稿：${formatTime(draft.updatedAt)}`);
      } else {
        updateDraftBadge('');
      }
    }

    function scheduleDraftSave() {
      if (draftTimer) {
        clearTimeout(draftTimer);
        draftTimer = null;
      }

      draftTimer = setTimeout(() => {
        const content = noteInput.value;

        if (content.trim() === '') {
          clearDraft();
        } else {
          saveDraft(content);
        }

        draftTimer = null;
      }, 500);
    }

    ball.addEventListener('click', () => {
      panel.classList.toggle('show');

      if (panel.classList.contains('show')) {
        renderNotes();
        restoreDraftIfNeeded();
        noteInput.focus();
      }
    });

    saveBtn.addEventListener('click', () => {
      saveNote();
    });

    cancelEditBtn.addEventListener('click', () => {
      exitEditingMode(false);
      restoreDraftIfNeeded();
      showHint('已取消编辑', 2000);
    });

    noteInput.addEventListener('input', () => {
      scheduleDraftSave();
    });

    noteInput.addEventListener('keydown', (event) => {
      const isSaveShortcut = (event.ctrlKey || event.metaKey) && event.key === 'Enter';

      if (isSaveShortcut) {
        event.preventDefault();
        saveNote();
      }
    });

    dragHandle.addEventListener('mousedown', (event) => {
      isDragging = true;
      ipcRenderer.send('drag-start', {
        screenX: event.screenX,
        screenY: event.screenY
      });
    });

    window.addEventListener('mousemove', (event) => {
      if (!isDragging) {
        return;
      }

      ipcRenderer.send('drag-move', {
        screenX: event.screenX,
        screenY: event.screenY
      });
    });

    window.addEventListener('mouseup', () => {
      if (!isDragging) {
        return;
      }

      isDragging = false;
      ipcRenderer.send('drag-end');
    });

    window.addEventListener('mouseleave', () => {
      if (!isDragging) {
        return;
      }

      isDragging = false;
      ipcRenderer.send('drag-end');
    });

    renderNotes();
    restoreDraftIfNeeded();
  </script>
</body>
</html>
