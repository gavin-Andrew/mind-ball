<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'"
  />
  <title>Mind Ball</title>

  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      position: relative;
      width: 430px;
      height: 320px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
    }

    .ball-area {
      width: 160px;
      height: 220px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }

    .drag-handle {
      width: 90px;
      height: 18px;
      margin-bottom: 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.28);
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.12);
      cursor: move;
      user-select: none;
    }

    .ball {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #7dd3fc, #2563eb);
      box-shadow: 0 0 25px rgba(37, 99, 235, 0.45);
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 20px;
      font-weight: bold;
      user-select: none;
      cursor: pointer;
    }

    .panel {
      position: absolute;
      left: 180px;
      top: 10px;
      width: 220px;
      min-height: 260px;
      max-height: 290px;
      padding: 12px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
      display: none;
      flex-direction: column;
      gap: 10px;
    }

    .panel.show {
      display: flex;
    }

    .panel textarea {
      width: 100%;
      height: 72px;
      resize: none;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 8px;
      box-sizing: border-box;
      font-size: 14px;
      outline: none;
    }

    .panel textarea:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.12);
    }

    .panel button {
      height: 36px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-size: 14px;
      cursor: pointer;
    }

    .panel button:hover {
      opacity: 0.92;
    }

    .hint {
      min-height: 18px;
      font-size: 12px;
      color: #666;
      text-align: center;
    }

    .notes-title {
      font-size: 13px;
      font-weight: bold;
      color: #2563eb;
      margin-top: 2px;
    }

    .notes-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow-y: auto;
      max-height: 130px;
      padding-right: 2px;
    }

    .empty-text {
      font-size: 12px;
      color: #777;
      text-align: center;
      padding: 10px 0;
    }

    .note-item {
      background: #f3f4f6;
      border-radius: 10px;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .note-content {
      font-size: 12px;
      color: #333;
      line-height: 1.5;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .note-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .note-time {
      font-size: 11px;
      color: #777;
      flex: 1;
    }

    .delete-btn {
      border: none;
      background: #ef4444;
      color: white;
      border-radius: 8px;
      padding: 4px 8px;
      font-size: 11px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      opacity: 0.9;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="ball-area">
      <div class="drag-handle" id="dragHandle" title="按住这里拖动"></div>
      <div class="ball" id="ball">Mind</div>
    </div>

    <div class="panel" id="panel">
      <textarea id="noteInput" placeholder="写下此刻的想法..."></textarea>
      <button id="saveBtn">保存</button>
      <div class="hint" id="hintText">还没有保存内容</div>

      <div class="notes-title">历史记录</div>
      <div class="notes-list" id="notesList"></div>
    </div>
  </div>

  <script>
    const fs = require('fs');
    const path = require('path');
    const { ipcRenderer } = require('electron');

    const dragHandle = document.getElementById('dragHandle');
    const ball = document.getElementById('ball');
    const panel = document.getElementById('panel');
    const saveBtn = document.getElementById('saveBtn');
    const noteInput = document.getElementById('noteInput');
    const hintText = document.getElementById('hintText');
    const notesList = document.getElementById('notesList');

    const notesFilePath = path.join(__dirname, 'notes.json');

    let isDragging = false;

    function readNotes() {
      if (!fs.existsSync(notesFilePath)) {
        return [];
      }

      try {
        const fileContent = fs.readFileSync(notesFilePath, 'utf-8');
        const notes = JSON.parse(fileContent);

        if (!Array.isArray(notes)) {
          return [];
        }

        return normalizeNotes(notes);
      } catch (error) {
        console.error('读取 notes.json 失败：', error);
        return [];
      }
    }

    function normalizeNotes(notes) {
      return notes.map((note, index) => {
        if (note.id && note.createdAt && note.updatedAt) {
          return note;
        }

        let oldTime = new Date().toISOString();

        if (note.time) {
          const parsedTime = new Date(note.time);
          if (!Number.isNaN(parsedTime.getTime())) {
            oldTime = parsedTime.toISOString();
          }
        }

        return {
          id: `old_note_${index}_${Date.now()}`,
          content: note.content || '',
          createdAt: oldTime,
          updatedAt: oldTime
        };
      });
    }

    function writeNotes(notes) {
      try {
        fs.writeFileSync(notesFilePath, JSON.stringify(notes, null, 2), 'utf-8');
        return true;
      } catch (error) {
        console.error('写入 notes.json 失败：', error);
        return false;
      }
    }

    function formatTime(isoString) {
      const date = new Date(isoString);

      if (Number.isNaN(date.getTime())) {
        return '时间未知';
      }

      return date.toLocaleString();
    }

    function renderNotes() {
      const notes = readNotes();
      notesList.innerHTML = '';

      if (notes.length === 0) {
        notesList.innerHTML = '<div class="empty-text">暂无记录</div>';
        return;
      }

      const reversedNotes = [...notes].reverse();

      reversedNotes.forEach((note) => {
        const item = document.createElement('div');
        item.className = 'note-item';

        const content = document.createElement('div');
        content.className = 'note-content';
        content.textContent = note.content || '暂无内容';

        const footer = document.createElement('div');
        footer.className = 'note-footer';

        const time = document.createElement('span');
        time.className = 'note-time';
        time.textContent = formatTime(note.createdAt);

        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'delete-btn';
        deleteBtn.textContent = '删除';

        deleteBtn.addEventListener('click', () => {
          deleteNote(note.id);
        });

        footer.appendChild(time);
        footer.appendChild(deleteBtn);

        item.appendChild(content);
        item.appendChild(footer);

        notesList.appendChild(item);
      });
    }

    function saveNote() {
      const text = noteInput.value.trim();

      if (text === '') {
        hintText.textContent = '你还没有输入内容';
        return;
      }

      const notes = readNotes();
      const now = new Date().toISOString();

      const newNote = {
        id: `note_${Date.now()}`,
        content: text,
        createdAt: now,
        updatedAt: now
      };

      notes.push(newNote);

      const success = writeNotes(notes);

      if (success) {
        hintText.textContent = '已保存到本地';
        noteInput.value = '';
        renderNotes();
        noteInput.focus();
      } else {
        hintText.textContent = '保存失败';
      }
    }

    function deleteNote(noteId) {
      const notes = readNotes();
      const filteredNotes = notes.filter((note) => note.id !== noteId);
      const success = writeNotes(filteredNotes);

      if (success) {
        hintText.textContent = '已删除一条记录';
        renderNotes();
      } else {
        hintText.textContent = '删除失败';
      }
    }

    ball.addEventListener('click', () => {
      panel.classList.toggle('show');

      if (panel.classList.contains('show')) {
        renderNotes();
        noteInput.focus();
      }
    });

    saveBtn.addEventListener('click', () => {
      saveNote();
    });

    noteInput.addEventListener('keydown', (event) => {
      const isSaveShortcut = (event.ctrlKey || event.metaKey) && event.key === 'Enter';

      if (isSaveShortcut) {
        event.preventDefault();
        saveNote();
      }
    });

    dragHandle.addEventListener('mousedown', (event) => {
      isDragging = true;
      ipcRenderer.send('drag-start', {
        screenX: event.screenX,
        screenY: event.screenY
      });
    });

    window.addEventListener('mousemove', (event) => {
      if (!isDragging) {
        return;
      }

      ipcRenderer.send('drag-move', {
        screenX: event.screenX,
        screenY: event.screenY
      });
    });

    window.addEventListener('mouseup', () => {
      if (!isDragging) {
        return;
      }

      isDragging = false;
      ipcRenderer.send('drag-end');
    });

    window.addEventListener('mouseleave', () => {
      if (!isDragging) {
        return;
      }

      isDragging = false;
      ipcRenderer.send('drag-end');
    });

    renderNotes();
  </script>
</body>
</html>
